<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Dashboard</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>

<style>
body{
background:#f8f6f2;
font-family:Arial, sans-serif;
margin:0;
padding:0;
}

header{
background:#7c5cff;
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
text-align:center;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:20px;
}

.top-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat-card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
text-align:center;
}

.stat-card h3{
margin:0;
font-size:18px;
color:#555;
}

.stat-card p{
font-size:28px;
font-weight:bold;
margin-top:8px;
color:#7c5cff;
}

.main-actions{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-bottom:20px;
}

.btn{
padding:10px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
display:inline-block;
}

.btn-primary{background:#7c5cff;color:white;}
.btn-edit{background:#f0ad4e;color:white;}
.btn-danger{background:#e74c3c;color:white;}
.btn-success{background:#27ae60;color:white;}

.card{
background:white;
padding:18px;
border-radius:15px;
margin-bottom:16px;
box-shadow:0 8px 18px rgba(0,0,0,.06);
}

.badge{
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
}

.pending{background:#f39c12;}
.completed{background:#27ae60;}
.missed{background:#e74c3c;}

#clock{
font-size:30px;
font-weight:bold;
color:#7c5cff;
}

.hero{
margin-bottom:20px;
}
</style>
</head>

<body>

<header>🌸 Sahaaya</header>

<div class="container">

<div class="hero">
<h2>Hi <span th:text="${session.name}">User</span> 👋</h2>
<p>Welcome to your Smart Elderly Care Dashboard</p>
</div>

<div class="top-grid">
<div class="stat-card">
<h3>Total Reminders</h3>
<p th:text="${#lists.size(reminders)}">0</p>
</div>

<div class="stat-card">
<h3>Current Time</h3>
<p id="clock"></p>
</div>

<div class="stat-card">
<h3>Cloud Storage</h3>
<p>Redis</p>
</div>

<div class="stat-card">
<h3>Status</h3>
<p>Active</p>
</div>
</div>

<div class="main-actions">
<a href="/add" class="btn btn-primary">+ Add Reminder</a>
<a href="/user" class="btn btn-edit">Edit User</a>
<button onclick="voiceReminder()" class="btn btn-success">🔊 Voice Reminder</button>
<button onclick="alert('Emergency Alert Sent!')" class="btn btn-danger">🚨 SOS</button>
</div>

<div th:if="${#lists.isEmpty(reminders)}" class="card">
No reminders yet.
</div>

<div th:each="r : ${reminders}" class="card">

<h3 th:text="${r.elderlyName}"></h3>

<p><b>Type:</b> <span th:text="${r.type}"></span></p>
<p><b>Time:</b> <span th:text="${r.scheduledTime}"></span></p>
<p><b>Note:</b> <span th:text="${r.description}"></span></p>

<span th:if="${r.status=='Pending'}" class="badge pending">Pending</span>
<span th:if="${r.status=='Completed'}" class="badge completed">Completed</span>
<span th:if="${r.status=='Missed'}" class="badge missed">Missed</span>

<br><br>

<a th:href="@{/checkin/{id}(id=${r.id})}" class="btn btn-success">✔ Done</a>
<a th:href="@{/edit/{id}(id=${r.id})}" class="btn btn-edit">Edit</a>
<a th:href="@{/delete/{id}(id=${r.id})}" class="btn btn-danger">Delete</a>

</div>

</div>

<script>
function updateClock(){
document.getElementById("clock").innerText =
new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

function voiceReminder(){
let msg = new SpeechSynthesisUtterance(
"Please remember to take your medicine on time."
);
speechSynthesis.speak(msg);
}
</script>

</body>
</html>
